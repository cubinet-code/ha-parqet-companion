name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx rollup -c --environment BUILD:production

      - name: Create release archive
        run: |
          zip -r parqet.zip custom_components/parqet/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: parqet.zip
          generate_release_notes: true
